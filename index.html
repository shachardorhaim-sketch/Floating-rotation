<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShaharPlay</title>
<style>
  :root {
    --bg: #0f1620;
    --panel: #172230;
    --panel-2: #1e2c3d;
    --line: #2a3b4f;
    --text: #e8eef5;
    --muted: #8ba0b5;
    --accent: #4fd1c5;
    --accent-2: #ffd166;
    --danger: #d9856b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    direction: rtl;
  }

  /* ---------- HEADER ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 14px 28px;
    background: linear-gradient(90deg, var(--panel), var(--panel-2));
    border-bottom: 2px solid var(--line);
    position: sticky;
    top: 0;
    z-index: 40;
  }

  .logo {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 1px;
  }
  .logo span { color: var(--accent); }

  nav {
    display: flex;
    gap: 4px;
    margin-right: auto;
  }
  nav button {
    background: none;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
  }
  nav button:hover { color: var(--text); background: rgba(255,255,255,.05); }

  /* ---------- HERO ---------- */
  .hero {
    margin: 24px 28px 8px;
    padding: 40px;
    border-radius: 14px;
    background:
      radial-gradient(circle at 80% 20%, rgba(79,209,197,.25), transparent 60%),
      linear-gradient(135deg, #1b2a3d, #12324a);
    border: 1px solid var(--line);
    position: relative;
    overflow: hidden;
  }
  .hero h1 { font-size: 34px; margin-bottom: 10px; }
  .hero p { color: var(--muted); max-width: 480px; line-height: 1.6; }
  .hero .tag {
    display: inline-block;
    background: var(--accent-2);
    color: #0f1620;
    font-weight: 700;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 14px;
  }

  /* ---------- STORE GRID ---------- */
  .section-title {
    margin: 28px 28px 14px;
    font-size: 20px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::before {
    content: "";
    width: 4px; height: 20px;
    background: var(--accent);
    border-radius: 2px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
    padding: 0 28px 40px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s, border-color .15s;
    display: flex;
    flex-direction: column;
  }
  .card:hover { transform: translateY(-4px); border-color: var(--accent); }
  .card:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

  .thumb {
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    position: relative;
  }
  .thumb::after {
    content: attr(data-badge);
    position: absolute;
    top: 10px; right: 10px;
    background: rgba(0,0,0,.5);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 12px;
  }

  .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; }
  .card-body h3 { font-size: 17px; margin-bottom: 4px; }
  .card-body p  { font-size: 13px; color: var(--muted); line-height: 1.5; flex: 1; }

  .play-btn {
    margin-top: 12px;
    background: var(--accent);
    color: #0f1620;
    border: none;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    padding: 9px;
    border-radius: 6px;
    cursor: pointer;
  }
  .play-btn.soon { background: var(--line); color: var(--muted); cursor: default; }

  /* ---------- GAME MODAL ---------- */
  #modal {
    position: fixed;
    inset: 0;
    background: rgba(8,12,18,.94);
    display: none;
    flex-direction: column;
    z-index: 100;
  }
  #modal.open { display: flex; }

  .modal-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .modal-bar h2 { font-size: 18px; margin-left: auto; }
  .modal-bar button {
    background: var(--danger);
    color: #0f1620;
    border: none;
    font-family: inherit;
    font-weight: 700;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
  }

  #stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: auto;
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 24px;
    border-top: 1px solid var(--line);
  }

  @media (max-width: 560px) {
    .hero { padding: 26px; }
    .hero h1 { font-size: 26px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Shahar<span>Play</span></div>
  <nav>
    <button>חנות</button>
    <button>הספרייה שלי</button>
    <button>אודות</button>
  </nav>
</header>

<div class="hero">
  <span class="tag">חדש בפלטפורמה</span>
  <h1>ברוך הבא ל‑ShaharPlay</h1>
  <p>אוסף המשחקים שלי — כולם נבנו כאן, מאפס. בחר משחק, לחץ שחק, ותהנה. משחקים חדשים נוספים כל הזמן.</p>
</div>

<div class="section-title">כל המשחקים</div>
<div class="grid" id="grid"></div>

<footer>נבנה על ידי שחר · ShaharPlay 2026</footer>

<!-- מסך המשחק -->
<div id="modal">
  <div class="modal-bar">
    <button onclick="closeGame()">← חזרה לחנות</button>
    <h2 id="modalTitle"></h2>
  </div>
  <div id="stage"></div>
</div>

<script>
// ====================================================
//  קטלוג המשחקים — כאן מוסיפים משחק חדש
// ====================================================
const GAMES = [
  {
    id: 'dino',
    title: 'Dino Runner',
    desc: 'רוץ, קפוץ מעל קקטוסים ושבור את השיא שלך.',
    icon: '🦖',
    bg: 'linear-gradient(135deg,#1b3a4b,#0d1b2a)',
    badge: 'ARCADE',
    play: mountDino
  },
  {
    id: 'catch',
    title: 'Star Catcher',
    desc: 'הזז את הסלסלה ותפוס כמה שיותר כוכבים נופלים.',
    icon: '⭐',
    bg: 'linear-gradient(135deg,#2a1b4b,#0d1b2a)',
    badge: 'CASUAL',
    play: mountCatch
  },
  {
    id: 'memory',
    title: 'Memory Match',
    desc: 'הפוך קלפים ומצא את כל הזוגות הזהים.',
    icon: '🧠',
    bg: 'linear-gradient(135deg,#1b4b3a,#0d1b2a)',
    badge: 'PUZZLE',
    play: mountMemory
  },
  {
    id: 'soon',
    title: 'משחק לחימה',
    desc: 'המשחק הגדול שלך ב‑Godot — בקרוב יגיע גם לכאן!',
    icon: '⚔️',
    bg: 'linear-gradient(135deg,#4b2a1b,#0d1b2a)',
    badge: 'SOON',
    soon: true
  }
];

// בניית החנות
const grid = document.getElementById('grid');
GAMES.forEach(g => {
  const card = document.createElement('div');
  card.className = 'card';
  card.tabIndex = 0;
  card.innerHTML = `
    <div class="thumb" data-badge="${g.badge}" style="background:${g.bg}">${g.icon}</div>
    <div class="card-body">
      <h3>${g.title}</h3>
      <p>${g.desc}</p>
      <button class="play-btn ${g.soon ? 'soon' : ''}">${g.soon ? 'בקרוב' : '▶ שחק'}</button>
    </div>`;
  if (!g.soon) {
    const open = () => openGame(g);
    card.querySelector('.play-btn').onclick = open;
    card.onclick = e => { if (e.target.tagName !== 'BUTTON') open(); };
    card.onkeydown = e => { if (e.key === 'Enter') open(); };
  }
  grid.appendChild(card);
});

// ====================================================
//  מנוע פתיחה / סגירה של משחק
// ====================================================
const modal = document.getElementById('modal');
const stage = document.getElementById('stage');
const modalTitle = document.getElementById('modalTitle');
let cleanup = null;   // פונקציה שעוצרת את המשחק הנוכחי

function openGame(g) {
  modalTitle.textContent = g.title;
  stage.innerHTML = '';
  modal.classList.add('open');
  cleanup = g.play(stage) || null;
}

function closeGame() {
  if (cleanup) cleanup();
  cleanup = null;
  stage.innerHTML = '';
  modal.classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && modal.classList.contains('open')) closeGame();
});

// ====================================================
//  משחק 1 — DINO RUNNER
// ====================================================
function mountDino(root) {
  root.innerHTML = `<canvas width="760" height="240" style="border:2px solid #2a3b4f;border-radius:8px;background:#0d1b2a;max-width:100%"></canvas>
    <div style="position:absolute;color:#8ba0b5;font-size:13px;margin-top:250px">רווח / קליק = קפיצה</div>`;
  const cv = root.querySelector('canvas');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height, G = H - 34;
  let dy = G, vy = 0, ground = true, obs = [], score = 0, speed = 6, f = 0, alive = true, raf;

  function jump() { if (ground) { vy = -12.5; ground = false; } }
  function reset() { dy = G; vy = 0; ground = true; obs = []; score = 0; speed = 6; alive = true; }

  const key = e => { if (e.code === 'Space') { e.preventDefault(); alive ? jump() : reset(); } };
  document.addEventListener('keydown', key);
  cv.addEventListener('pointerdown', () => alive ? jump() : reset());

  function loop() {
    raf = requestAnimationFrame(loop);
    f++;
    ctx.clearRect(0, 0, W, H);
    ctx.strokeStyle = '#4fd1c5'; ctx.beginPath();
    ctx.moveTo(0, G + 6); ctx.lineTo(W, G + 6); ctx.stroke();

    if (alive) {
      vy += 0.7; dy += vy;
      if (dy >= G) { dy = G; vy = 0; ground = true; }
      if (f % 80 === 0) obs.push({ x: W, h: 22 + Math.random() * 22 });
      score++; if (score % 120 === 0) speed += 0.4;
    }

    // דינו
    ctx.fillStyle = '#7fd8be';
    ctx.fillRect(56, dy - 30, 26, 30);
    ctx.fillRect(76, dy - 36, 12, 10);

    // קקטוסים
    ctx.fillStyle = '#5a8f5f';
    for (let i = obs.length - 1; i >= 0; i--) {
      const o = obs[i];
      if (alive) o.x -= speed;
      ctx.fillRect(o.x, G - o.h, 12, o.h);
      if (56 < o.x + 12 && 82 > o.x && dy > G - o.h) alive = false;
      if (o.x < -20) obs.splice(i, 1);
    }

    ctx.fillStyle = '#e8eef5';
    ctx.font = 'bold 16px monospace';
    ctx.fillText(String(score).padStart(5, '0'), W - 90, 28);
    if (!alive) {
      ctx.fillStyle = '#ffd166';
      ctx.font = 'bold 22px monospace';
      ctx.fillText('נפסלת! רווח להתחלה', W / 2 - 130, H / 2);
    }
  }
  loop();
  return () => { cancelAnimationFrame(raf); document.removeEventListener('keydown', key); };
}

// ====================================================
//  משחק 2 — STAR CATCHER
// ====================================================
function mountCatch(root) {
  root.innerHTML = `<canvas width="640" height="440" style="border:2px solid #2a3b4f;border-radius:8px;background:#0d1b2a;max-width:100%"></canvas>`;
  const cv = root.querySelector('canvas');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  let px = W / 2, stars = [], score = 0, miss = 0, f = 0, raf;
  const left = { l: false, r: false };

  const kd = e => { if (e.code === 'ArrowLeft') left.l = true; if (e.code === 'ArrowRight') left.r = true; };
  const ku = e => { if (e.code === 'ArrowLeft') left.l = false; if (e.code === 'ArrowRight') left.r = false; };
  document.addEventListener('keydown', kd);
  document.addEventListener('keyup', ku);
  cv.addEventListener('pointermove', e => {
    const r = cv.getBoundingClientRect();
    px = (e.clientX - r.left) * (W / r.width);
  });

  function loop() {
    raf = requestAnimationFrame(loop);
    f++;
    if (left.l) px -= 7;
    if (left.r) px += 7;
    px = Math.max(40, Math.min(W - 40, px));

    ctx.clearRect(0, 0, W, H);
    if (f % 35 === 0) stars.push({ x: 30 + Math.random() * (W - 60), y: -20, s: 2.5 + Math.random() * 2 });

    // כוכבים
    ctx.font = '26px serif';
    for (let i = stars.length - 1; i >= 0; i--) {
      const s = stars[i];
      s.y += s.s;
      ctx.fillText('⭐', s.x - 13, s.y);
      if (s.y > H - 40 && Math.abs(s.x - px) < 45) { score++; stars.splice(i, 1); }
      else if (s.y > H) { miss++; stars.splice(i, 1); }
    }

    // סלסלה
    ctx.fillStyle = '#ffd166';
    ctx.fillRect(px - 40, H - 26, 80, 16);

    ctx.fillStyle = '#e8eef5';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('כוכבים: ' + score, 16, 26);
    ctx.fillStyle = '#d9856b';
    ctx.fillText('פספוסים: ' + miss + '/10', 16, 48);

    if (miss >= 10) {
      ctx.fillStyle = 'rgba(8,12,18,.85)'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#ffd166'; ctx.font = 'bold 24px monospace';
      ctx.fillText('הסתיים! תפסת ' + score + ' כוכבים', W / 2 - 150, H / 2);
      cancelAnimationFrame(raf);
    }
  }
  loop();
  return () => { cancelAnimationFrame(raf); document.removeEventListener('keydown', kd); document.removeEventListener('keyup', ku); };
}

// ====================================================
//  משחק 3 — MEMORY MATCH
// ====================================================
function mountMemory(root) {
  const emojis = ['🍎','🚀','🐸','🎸','⚽','🌈','👾','🍕'];
  let deck = [...emojis, ...emojis]
    .sort(() => Math.random() - 0.5)
    .map((e, i) => ({ e, i, up: false, done: false }));
  let first = null, lock = false, matched = 0;

  root.innerHTML = `
    <div style="text-align:center">
      <div id="memInfo" style="color:#8ba0b5;margin-bottom:14px;font-size:15px">מצא את כל 8 הזוגות</div>
      <div id="memBoard" style="display:grid;grid-template-columns:repeat(4,72px);gap:10px;justify-content:center"></div>
    </div>`;
  const board = root.querySelector('#memBoard');
  const info = root.querySelector('#memInfo');

  function render() {
    board.innerHTML = '';
    deck.forEach(c => {
      const el = document.createElement('button');
      el.style.cssText =
        'width:72px;height:72px;font-size:30px;border-radius:10px;cursor:pointer;' +
        'border:2px solid #2a3b4f;background:' + (c.up || c.done ? '#1e2c3d' : '#172230') +
        ';color:' + (c.done ? '#4fd1c5' : '#e8eef5');
      el.textContent = (c.up || c.done) ? c.e : '❓';
      el.onclick = () => flip(c);
      board.appendChild(el);
    });
  }

  function flip(c) {
    if (lock || c.up || c.done) return;
    c.up = true; render();
    if (!first) { first = c; return; }
    lock = true;
    if (first.e === c.e) {
      first.done = c.done = true; matched++;
      first = null; lock = false; render();
      if (matched === 8) info.textContent = '🎉 ניצחת! מצאת את כל הזוגות';
    } else {
      setTimeout(() => {
        first.up = c.up = false; first = null; lock = false; render();
      }, 700);
    }
  }
  render();
  return () => {};
}
</script>
</body>
</html>
