<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating rotation</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ החנות (מסך ראשי) ============ -->
<div id="store">
  <header class="site-head">
    <div class="logo">Floating<span>rotation</span></div>
  </header>

  <div class="hero">
    <span class="tag">פלטפורמת המשחקים שלי</span>
    <h1>ברוך הבא!</h1>
    <p>אוסף המשחקים שלי — כולם נבנו כאן. בחר משחק ושחק!</p>
  </div>

  <div class="section-title">כל המשחקים</div>
  <div class="grid" id="grid"></div>

  <footer class="site-foot">נבנה על ידי שחר דור-חיים ורובין שמואלי · Floating rotation 2026</footer>
</div>

<!-- ============ מסך המשחק ============ -->
<div id="gameHost">
  <div class="host-bar">
    <button id="backBtn">← חזרה לחנות</button>
    <span id="gameTitle"></span>
  </div>
  <div id="gameMount"></div>
</div>

<!-- ============ הקבצים ============ -->
<!-- חשוב: הסדר חשוב! קודם הנתונים, אחר כך המשחקים, ובסוף הפלטפורמה -->

<!-- 1. הדמויות והתמונות (קובץ כבד — לא נוגעים בו) -->
<script src="sprites.js"></script>

<!-- 2. קטלוג הדמויות (שמות ומחירים) -->
<script src="characters.js"></script>

<!-- 3. המשחקים -->
<script src="game-dino.js"></script>
<script src="game-star-catcher.js"></script>
<script src="game-memory.js"></script>
<script src="game-chess.js"></script>
<script src="game-tetris.js"></script>
<!-- 4. הפלטפורמה (חייב להיות אחרון!) -->
<script src="platform.js"></script>

</body>
</html>
